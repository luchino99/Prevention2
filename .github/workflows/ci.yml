# =============================================================================
# Uelfy Clinical — Continuous Integration
# -----------------------------------------------------------------------------
# Mirrors what `npm run build:check && npm test` does locally, but in a
# clean Ubuntu container that reproduces the Vercel build environment.
#
# Trigger model
# -------------
#   * pull_request -> main : required check (once branch protection is on)
#   * push -> main         : sanity gate on direct merges
#   * release  (published) : Sprint 1 task 1.6 — generate fresh SBOM and
#                            attach it (plus the CVE report) as release
#                            assets so any downstream consumer / auditor
#                            (clinical procurement, IEC 62304 SOUP review)
#                            can download the exact SBOM that corresponds
#                            to a tagged version.
#
# Required env / secrets
# ----------------------
#   DATABASE_URL_STAGING : repository secret. When configured, build-and-test
#                          exposes it via env and the run-rls-tests.mjs gate
#                          executes 6 cross-tenant negative assertions against
#                          the staging Supabase. The script is FAIL-CLOSED in
#                          CI when this is set: any psql error, missing test
#                          file, or assertion failure breaks the build (Sprint
#                          7 task 7.2). When the secret is empty / unset the
#                          script SKIPs with a visible WARN (rollout window
#                          before the user has provisioned staging — see
#                          docs/35-RLS-STAGING-RUNBOOK.md, ~30 min). Never
#                          point this at production — psql runs RESET ROLE
#                          but the SQL test still writes/reads against the
#                          target DB inside a ROLLBACK transaction.
#
# Hardening choices
# -----------------
#   * SBOM_CVE_FAIL_ON_HIGH=true forces check-sbom-cves to exit non-zero
#     on any HIGH runtime CVE (default policy in CI is stricter than dev).
#   * permissions: contents: read   -> least-privilege workflow token.
#     The release-sbom job overrides to `contents: write` because
#     uploading release assets requires it; that elevation is scoped to
#     that single job only.
#   * concurrency: cancel in-progress runs on same branch when a new
#     commit lands; saves CI minutes and avoids stale results.
#   * Lockfile drift detection: `npm ci` must NOT modify package-lock.json.
#     If it does, the lockfile is not canonical and the build is flagged.
#   * SBOM drift detection: `npm run sbom:refresh` must produce zero diff
#     against the committed sbom.cyclonedx.json.
#   * SBOM determinism gate (Sprint 1 task 1.6): two consecutive
#     `npm run sbom:refresh` invocations must produce byte-equal output.
#     Catches future regressions of the canonicalisation logic — the
#     class of bug that caused the 5-hotfix saga around metadata.tools
#     version, metadata.component.name, fsevents, and @esbuild platform
#     binaries.
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build:check + test (Node 20 / Ubuntu 22)
    # Skip on release events — the gates already ran when the commit
    # was pushed to main. Re-running on release would burn minutes for
    # no signal change.
    if: github.event_name != 'release'
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    env:
      SBOM_CVE_FAIL_ON_HIGH: 'true'
      # Sprint 7 task 7.2 — expose the staging DB URL only when it is
      # configured as a repository secret. Empty string when unset, in
      # which case run-rls-tests.mjs SKIPs with a visible WARN (it does
      # NOT silently no-op — see the matrix in that script's header).
      # The secret name DATABASE_URL_STAGING is documented in
      # docs/35-RLS-STAGING-RUNBOOK.md as the canonical CI alias.
      DATABASE_URL_STAGING: ${{ secrets.DATABASE_URL_STAGING }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Verify psql is available (Sprint 7 task 7.2)
        # ubuntu-22.04 ships postgresql-client by default. Verify it
        # explicitly so a future runner image change that drops psql
        # surfaces as a failed step instead of as a silent RLS-test
        # SKIP (which would be impossible to notice without reading
        # build logs daily).
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            echo "::warning::psql not on PATH — installing postgresql-client"
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends postgresql-client
          fi
          psql --version

      - name: Print toolchain versions
        run: |
          node --version
          npm --version
          echo "engines:"
          node -e "console.log(JSON.stringify(require('./package.json').engines, null, 2))"

      - name: Install (mirror Vercel — npm ci with devDeps)
        run: npm ci --include=dev --no-audit --no-fund

      - name: Lockfile must be canonical (no drift after npm ci)
        run: |
          if ! git diff --quiet package-lock.json; then
            echo "::error::package-lock.json was modified by npm ci."
            echo "::error::This means the committed lockfile is not canonical."
            echo "::error::Run \`rm -rf node_modules && npm ci\` locally to verify."
            git diff package-lock.json | head -200
            exit 1
          fi
          echo "OK package-lock.json is canonical"

      - name: Build gates (10 checks incl. CVE fail-on-high)
        run: npm run build:check

      - name: Test suite (vitest — counts surfaced in step summary)
        # Stale-count guard
        # -----------------
        # The Sprint 5 commit hard-coded "244 tests expected" here. That
        # decayed once Sprint 6 task 6.1 added the per-module coverage
        # gate (+5 test files) and the validated-score reference golden
        # suites (+ dual-assertion equivalence). Rather than chase a
        # number that drifts every sprint, we let vitest report the
        # actual count and the step summary records it; the value is
        # informational, not gating.
        run: |
          npm test
          # Render the pass count in the run summary if vitest produced one.
          # We re-derive a quick count of test files for the audit trail —
          # cheap and exact, no dep on vitest's reporter format.
          TEST_FILE_COUNT=$(find tests -name "*.test.ts" -type f | wc -l | tr -d ' ')
          echo "## Test suite — \`npm test\` passed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "* Test files: **${TEST_FILE_COUNT}** (find tests -name '*.test.ts')" >> "$GITHUB_STEP_SUMMARY"
          echo "* Commit: \`${GITHUB_SHA::7}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: SBOM must be fresh
        run: |
          npm run sbom:refresh
          if ! git diff --quiet sbom.cyclonedx.json; then
            echo "::error::sbom.cyclonedx.json drift after \`npm run sbom:refresh\`."
            echo "::error::Run \`npm run sbom:refresh\` locally and commit the updated file."
            git diff --stat sbom.cyclonedx.json
            exit 1
          fi
          echo "OK sbom.cyclonedx.json matches lockfile-resolved SBOM"

      - name: SBOM determinism (anti-recidiva — Sprint 1 task 1.6)
        run: |
          # Two consecutive `npm run sbom:refresh` MUST produce byte-equal
          # output. The 5-hotfix saga during Sprint 1 task 1.3 (metadata.tools
          # version, metadata.component.name, fsevents, @esbuild platform
          # binaries) was caused by canonicaliseSbom failing to strip a
          # volatile field. This gate catches the next such regression
          # immediately — before the SBOM-drift gate can mask it as a
          # platform-only diff.
          npm run sbom:refresh > /dev/null
          cp sbom.cyclonedx.json /tmp/sbom-run-1.json
          npm run sbom:refresh > /dev/null
          if ! diff -q /tmp/sbom-run-1.json sbom.cyclonedx.json > /dev/null; then
            echo "::error::SBOM determinism violated."
            echo "::error::Two consecutive \`npm run sbom:refresh\` produced different output."
            echo "::error::A new volatile field has slipped past canonicaliseSbom."
            echo "::error::Inspect the diff below and add the field to the strip list in"
            echo "::error::scripts/sbom-canonicalise.mjs (see metadata.tools/component handling)."
            diff -u /tmp/sbom-run-1.json sbom.cyclonedx.json | head -80 >&2
            exit 1
          fi
          echo "OK SBOM is bytewise idempotent across consecutive refreshes"

  coverage-gate:
    # ==========================================================================
    # Sprint 7 task 7.1 — Per-module code-coverage gate enforced in CI.
    # --------------------------------------------------------------------------
    # `npm run check:coverage` (Sprint 6 task 6.1) chains `test:coverage` and
    # `scripts/check-coverage-thresholds.mjs`. The gate enforces per-module
    # line-coverage floors:
    #
    #   * Tier 1 (validated formulas — SCORE2, SCORE2-DM, eGFR, FIB-4, FRAIL,
    #     ADA, BMI, MetS, FLI, SCORE2-eligibility): 85-90%
    #   * Tier 2 (interpretation — composite-risk, alert-deriver, follow-up):
    #     80%
    #   * Tier 3 (supporting — guideline-registry, guideline-resolver): 70%
    #
    # Why a SEPARATE job instead of folding into `build-and-test`
    # -----------------------------------------------------------
    #   * `build-and-test` is already tight (10 minute timeout). Coverage
    #     instrumentation roughly doubles vitest's wall time. Keeping it
    #     in its own job lets the structural gates and the test suite
    #     surface their signal faster.
    #   * The two jobs run in parallel (no `needs:` here). CI minutes are
    #     traded for time-to-signal. The duplicated `npm ci` cost is
    #     amortised by the actions/setup-node cache.
    #   * If `check:coverage` fails, the PR cannot merge once branch
    #     protection requires this check name (planned post-Sprint 7).
    #
    # Skip semantics
    # --------------
    #   * Release events skip this job (same rationale as build-and-test:
    #     gates already ran on the commit that produced the release).
    #   * The gate script SKIPs gracefully if `coverage/coverage-summary.json`
    #     is absent — but we explicitly assert it exists between
    #     `test:coverage` and the gate, so a silent skip in CI is impossible.
    #
    # Artefacts
    # ---------
    #   The HTML coverage report is uploaded as a workflow artefact so a
    #   reviewer can drill into per-line coverage from the run page
    #   without re-running tests locally. 7-day retention is enough for
    #   review windows and cheap on storage.
    # ==========================================================================
    name: Coverage gate (per-module Tier 1/2/3 floors)
    if: github.event_name != 'release'
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install (mirror Vercel — npm ci with devDeps)
        run: npm ci --include=dev --no-audit --no-fund

      - name: Generate coverage report (v8 provider, json-summary)
        # `npm run test:coverage` writes:
        #   coverage/coverage-summary.json  (machine-readable, gate input)
        #   coverage/index.html              (human-readable drill-down)
        #   coverage/lcov.info               (CI / external tools)
        run: npm run test:coverage

      - name: Assert coverage summary exists
        # Defensive — if vitest's v8 reporter regresses and stops
        # emitting the summary, the gate would SKIP graceful and let a
        # silent coverage drop through. Hard-assert presence in CI to
        # close that loop.
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "::error::coverage/coverage-summary.json was not produced by \`npm run test:coverage\`."
            echo "::error::Most likely cause: vitest v8 reporter config drift in tests/vitest.config.ts."
            echo "::error::Expected reporters: ['text', 'html', 'lcov', 'json-summary']"
            ls -la coverage/ 2>&1 || echo "(coverage/ directory absent)"
            exit 1
          fi
          echo "OK coverage/coverage-summary.json present ($(wc -c < coverage/coverage-summary.json) bytes)"

      - name: Enforce per-module coverage thresholds
        # The gate exits 2 on any module below its floor (printed table
        # of offenders is in the step's stderr). exits 0 otherwise.
        run: node scripts/check-coverage-thresholds.mjs

      - name: Upload coverage HTML report (artefact, 7-day retention)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-${{ github.sha }}
          path: coverage/
          retention-days: 7
          if-no-files-found: warn

      - name: Coverage summary in job output
        if: always()
        run: |
          {
            echo "## Coverage gate — commit ${GITHUB_SHA::7}"
            echo ""
            echo "* Result: **${{ job.status }}**"
            if [ -f coverage/coverage-summary.json ]; then
              # Show the global total as a quick orientation. The
              # per-module enforcement is what actually gates the build.
              TOTAL_LINES=$(node -e "const s=require('./coverage/coverage-summary.json'); console.log(s.total?.lines?.pct ?? 'n/a');")
              TOTAL_FUNCS=$(node -e "const s=require('./coverage/coverage-summary.json'); console.log(s.total?.functions?.pct ?? 'n/a');")
              TOTAL_BRANCHES=$(node -e "const s=require('./coverage/coverage-summary.json'); console.log(s.total?.branches?.pct ?? 'n/a');")
              echo "* Lines (total): **${TOTAL_LINES}%**"
              echo "* Functions (total): **${TOTAL_FUNCS}%**"
              echo "* Branches (total): **${TOTAL_BRANCHES}%**"
              echo ""
              echo "Per-module floors enforced by \`scripts/check-coverage-thresholds.mjs\`."
              echo "HTML drill-down attached as artefact \`coverage-html-${GITHUB_SHA::7}\`."
            else
              echo "* Coverage summary was not generated — see job log."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  release-sbom:
    name: Attach SBOM to GitHub Release (Sprint 1 task 1.6)
    # Fires only when a Release is published from the GitHub UI or via
    # `gh release create`. The build-and-test job is skipped on this
    # event (see its `if:` above) — this is the only job that runs.
    if: github.event_name == 'release'
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    permissions:
      # Elevation needed to upload assets to the release. Scoped to this
      # job only — build-and-test keeps the read-only default.
      contents: write

    steps:
      - name: Checkout (the tag pointed to by the release)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 1

      - name: Setup Node from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install (mirror Vercel — npm ci with devDeps)
        run: npm ci --include=dev --no-audit --no-fund

      - name: Generate fresh SBOM + CVE report for this release
        run: |
          npm run sbom:refresh
          # Run the CVE scanner but never fail the release on it — the
          # CVE state is informative, not blocking, at release time. If
          # the founder/operator wants to refuse the release on a HIGH,
          # they can revoke the release manually.
          node scripts/check-sbom-cves.mjs || true

      - name: Show SBOM + CVE summary in run log
        run: |
          echo "=== SBOM file size and component count ==="
          ls -la sbom.cyclonedx.json
          node -e "console.log('components:', JSON.parse(require('fs').readFileSync('sbom.cyclonedx.json','utf8')).components.length)"
          echo ""
          echo "=== CVE report counts ==="
          node -e "
            const r = JSON.parse(require('fs').readFileSync('sbom-cve-report.json','utf8'));
            console.log(JSON.stringify({total: r.total, counts: r.counts}, null, 2));
          "

      - name: Upload SBOM + CVE report as release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            sbom.cyclonedx.json
            sbom-cve-report.json
          fail_on_unmatched_files: true

  smoke-prod:
    # ==========================================================================
    # Sprint 1 task 1.7 — Production smoke test post-deploy.
    # --------------------------------------------------------------------------
    # When a commit lands on main, Vercel auto-deploys to production. This job
    # verifies the new deploy actually responds: hits /api/v1/health (which
    # internally checks Supabase + Upstash), then hits a few critical static
    # paths (root redirect, login page, Supabase bundle, security.txt
    # rewrite, security headers).
    #
    # If anything fails, this job goes red and you get a GitHub notification —
    # production is in a bad state and needs manual intervention. Vercel keeps
    # the previous deploy live when a build fails, so a red smoke does NOT
    # automatically mean production is down (it could be that build is fresh
    # and the new deploy regressed). Either way, you know.
    #
    # Why polling instead of a fixed wait
    # -----------------------------------
    # Vercel build time varies from ~30s (cache hit) to ~3 min (cold). A
    # fixed delay either wastes CI minutes or fires before the deploy is
    # ready. We wait 60s upfront (build typically starts within 10s of push
    # and takes another 30-60s), then retry every 15s up to 6 times. Total
    # max wait: 60 + 15*6 = 150s = 2.5 min before we declare prod down.
    #
    # Why we don't poll the Vercel API for deployment readiness
    # ---------------------------------------------------------
    # That would be more accurate but requires VERCEL_TOKEN as a GitHub
    # secret + project/team IDs, plus extra config maintenance. Polling the
    # health endpoint directly is end-to-end correct (if /api/v1/health
    # returns 200, the deploy *is* live and Supabase *is* reachable) and
    # has no token to rotate. Trade-off accepted for Sprint 1.
    # ==========================================================================
    name: Production smoke test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-22.04
    timeout-minutes: 8

    env:
      PROD_URL: https://prevention2.vercel.app

    steps:
      - name: Wait 60s for Vercel deploy to start
        run: sleep 60

      - name: Health endpoint with polling (up to 6 attempts, 15s backoff)
        run: |
          for attempt in 1 2 3 4 5 6; do
            echo "::group::Health attempt ${attempt}/6"
            HTTP_CODE=$(curl -sS -o /tmp/health.json -w "%{http_code}" \
                        --max-time 10 "$PROD_URL/api/v1/health" || echo "000")
            echo "HTTP code: $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "207" ]; then
              echo "Body:"
              cat /tmp/health.json
              echo ""
              echo "::endgroup::"
              echo "OK health endpoint reachable on attempt ${attempt}"
              exit 0
            fi
            echo "Body (failure):"
            cat /tmp/health.json 2>/dev/null | head -50 || echo "(no body)"
            echo "::endgroup::"
            if [ "$attempt" = "6" ]; then
              echo "::error::Health endpoint unreachable after 6 attempts (final code: $HTTP_CODE)"
              echo "::error::Either Vercel build failed (check vercel dashboard) or production is down."
              exit 1
            fi
            sleep 15
          done

      - name: Verify health status field is acceptable (not unhealthy)
        run: |
          STATUS=$(jq -r '.status // "missing"' /tmp/health.json)
          echo "Reported status: $STATUS"
          case "$STATUS" in
            ok|degraded)
              echo "Acceptable health status"
              ;;
            unhealthy)
              echo "::error::Production reports UNHEALTHY status"
              echo "Subsystems:"
              jq -r '.subsystems[] | "  \(.name): \(.status) (\(.detail // "no detail"))"' /tmp/health.json
              exit 1
              ;;
            *)
              echo "::error::Unexpected health status: \"$STATUS\""
              cat /tmp/health.json
              exit 1
              ;;
          esac

      - name: Verify Supabase subsystem is up
        run: |
          SUPABASE_STATUS=$(jq -r '.subsystems[] | select(.name=="supabase") | .status' /tmp/health.json)
          SUPABASE_LATENCY=$(jq -r '.subsystems[] | select(.name=="supabase") | .latencyMs // "?"' /tmp/health.json)
          echo "Supabase: $SUPABASE_STATUS (${SUPABASE_LATENCY}ms)"
          if [ "$SUPABASE_STATUS" != "ok" ]; then
            echo "::error::Supabase subsystem reports: $SUPABASE_STATUS"
            jq -r '.subsystems[] | select(.name=="supabase")' /tmp/health.json
            exit 1
          fi
          echo "OK Supabase reachable"

      - name: Verify MFA enforcement policy is fully active (Sprint 2 task 2.3)
        run: |
          # The /api/v1/health subsystem `mfa_enforcement` reports whether
          # all three MFA flags (admin / clinician / staff) are ON in the
          # Vercel production environment. If any is OFF, the corresponding
          # role can sign in with password-only — a high-impact policy
          # regression that no compile-time check can catch.
          MFA_STATUS=$(jq -r '.subsystems[] | select(.name=="mfa_enforcement") | .status // "missing"' /tmp/health.json)
          MFA_DETAIL=$(jq -r '.subsystems[] | select(.name=="mfa_enforcement") | .detail // "none"' /tmp/health.json)
          echo "MFA enforcement: $MFA_STATUS (detail: $MFA_DETAIL)"
          if [ "$MFA_STATUS" = "missing" ]; then
            echo "::error::mfa_enforcement subsystem missing from /api/v1/health response."
            echo "::error::Either the deployed code is older than Sprint 2 task 2.3, or the handler is broken."
            exit 1
          fi
          if [ "$MFA_STATUS" != "ok" ]; then
            echo "::error::MFA enforcement is NOT fully active in production."
            echo "::error::detail: $MFA_DETAIL"
            echo "::error::Fix: set MFA_ENFORCEMENT_ENABLED, MFA_ENFORCEMENT_CLINICIAN_ENABLED,"
            echo "::error::and MFA_ENFORCEMENT_STAFF_ENABLED to \"true\" in Vercel project env vars."
            echo "::error::See docs/20-SECURITY.md §MFA enforcement for the activation runbook."
            exit 1
          fi
          echo "OK MFA enforcement: all 3 flags active (admin + clinician + staff)"

      - name: Verify rate-limit (Upstash) subsystem is up (Sprint 2 task 2.4)
        run: |
          # The /api/v1/health subsystem `rate_limit_distributed` reports
          # whether Upstash Redis is configured (UPSTASH_REDIS_REST_URL +
          # UPSTASH_REDIS_REST_TOKEN env vars set). When degraded, the
          # rate-limit middleware falls back to in-memory counters which
          # do NOT work cross-lambda — an attacker hitting 100 different
          # serverless instances bypasses the limit entirely.
          # In production this MUST be "ok". The previous "Verify health
          # status" step accepts "degraded" as overall status (so smoke
          # doesn't fail on transient Upstash hiccups for non-PHI paths)
          # — this dedicated step makes the per-subsystem requirement
          # explicit and blocking.
          RL_STATUS=$(jq -r '.subsystems[] | select(.name=="rate_limit_distributed") | .status // "missing"' /tmp/health.json)
          RL_DETAIL=$(jq -r '.subsystems[] | select(.name=="rate_limit_distributed") | .detail // "none"' /tmp/health.json)
          echo "rate_limit_distributed: $RL_STATUS (detail: $RL_DETAIL)"
          if [ "$RL_STATUS" = "missing" ]; then
            echo "::error::rate_limit_distributed subsystem missing from /api/v1/health response."
            exit 1
          fi
          if [ "$RL_STATUS" != "ok" ]; then
            echo "::error::Distributed rate-limit (Upstash) is NOT active in production."
            echo "::error::detail: $RL_DETAIL"
            echo "::error::Fix: set UPSTASH_REDIS_REST_URL and UPSTASH_REDIS_REST_TOKEN in Vercel"
            echo "::error::project Environment Variables (Production scope)."
            echo "::error::See docs/20-SECURITY.md §Rate limiting for the provisioning runbook."
            exit 1
          fi
          echo "OK Upstash rate-limit active (cross-lambda counters working)"

      - name: Smoke check — root path redirects to login (307/308)
        run: |
          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 5 "$PROD_URL/")
          if [ "$HTTP_CODE" != "307" ] && [ "$HTTP_CODE" != "308" ]; then
            echo "::error::Root expected 307/308 redirect to login, got: $HTTP_CODE"
            exit 1
          fi
          echo "OK root redirects ($HTTP_CODE)"

      - name: Smoke check — login page reachable (200)
        run: |
          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 5 "$PROD_URL/pages/login.html")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Login page expected 200, got: $HTTP_CODE"
            exit 1
          fi
          echo "OK login page (200)"

      - name: Smoke check — Supabase bundle served (200)
        run: |
          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 5 \
                      "$PROD_URL/assets/vendor/supabase-js.esm.js")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Supabase bundle expected 200, got: $HTTP_CODE"
            exit 1
          fi
          echo "OK supabase bundle served (200)"

      - name: Smoke check — security.txt rewrite (200)
        run: |
          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 5 "$PROD_URL/security.txt")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::security.txt rewrite expected 200, got: $HTTP_CODE"
            exit 1
          fi
          echo "OK security.txt rewrite working (200)"

      - name: Smoke check — security headers present on /pages/login.html
        run: |
          HEADERS=$(curl -sS -I --max-time 5 "$PROD_URL/pages/login.html")
          MISSING=""
          for header in "content-security-policy" "strict-transport-security" "x-frame-options" "x-content-type-options" "referrer-policy" "permissions-policy"; do
            if echo "$HEADERS" | grep -qi "^$header:"; then
              echo "OK $header"
            else
              echo "MISSING $header"
              MISSING="${MISSING}${header} "
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::error::Missing security headers: $MISSING"
            echo "Full response headers:"
            echo "$HEADERS" | head -30
            exit 1
          fi
          echo "OK all 6 security headers present"

      - name: Smoke summary in job output
        if: always()
        run: |
          {
            echo "## Production smoke test — commit ${GITHUB_SHA::7}"
            echo ""
            echo "* Result: **${{ job.status }}**"
            echo "* Production URL: $PROD_URL"
            echo "* Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo ""
            if [ -f /tmp/health.json ]; then
              echo "### /api/v1/health response"
              echo '```json'
              cat /tmp/health.json
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
