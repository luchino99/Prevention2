<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Patients — Uelfy Clinical</title>
  <!-- Favicon set (clinical-context) — see frontend/assets/icons/favicon.svg -->
  <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg" />
  <link rel="alternate icon" type="image/png" sizes="32x32" href="../assets/icons/favicon-32.png" />
  <link rel="alternate icon" type="image/png" sizes="16x16" href="../assets/icons/favicon-16.png" />
  <link rel="shortcut icon" href="../assets/icons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/icons/apple-touch-icon.png" />
  <meta name="theme-color" content="#0E5C7B" />
  <link rel="stylesheet" href="../assets/css/app.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="app-sidebar">
      <div class="brand">Uelfy Clinical</div>
      <nav>
        <a href="./dashboard.html">Dashboard</a>
        <a href="./patients.html" class="active">Patients</a>
        <a href="./alerts.html">Alerts</a>
        <a href="./audit.html" id="nav-audit" class="hidden">Audit log</a>
        <a href="./tenant-settings.html">Tenant settings</a>
        <a href="#" id="signout-link">Sign out</a>
      </nav>
    </aside>

    <main class="app-main" id="main-content" tabindex="-1">
      <div id="nav-header-mount"></div>

      <div class="topbar">
        <div>
          <h1 style="margin-bottom:2px;">Patients</h1>
          <div class="muted" id="tenant-label">Loading…</div>
        </div>
        <div class="flex gap-8">
          <input
            id="search-input"
            type="search"
            placeholder="Search by name or code…"
            autocomplete="off"
          />
          <button class="btn" id="new-patient-btn" type="button">+ New patient</button>
        </div>
      </div>

      <section class="card">
        <div id="patients-table-wrap">
          <p class="muted">Loading…</p>
        </div>
        <div class="flex between mt-16" id="pagination-wrap"></div>
      </section>
    </main>
  </div>

  <!-- New patient dialog -->
  <dialog id="new-patient-dialog" class="dialog">
    <form id="new-patient-form" method="dialog" class="dialog-body">
      <h3 style="margin-top:0;">New patient</h3>
      <div id="np-error" class="inline-alert danger hidden"></div>

      <div class="grid two">
        <div class="field">
          <label>First name *</label>
          <input name="firstName" required maxlength="100" />
        </div>
        <div class="field">
          <label>Last name *</label>
          <input name="lastName" required maxlength="100" />
        </div>
      </div>

      <div class="grid two">
        <div class="field">
          <label>External code *</label>
          <input name="externalCode" required maxlength="50" placeholder="MRN, internal id…" />
        </div>
        <div class="field">
          <label>Sex *</label>
          <select name="sex" required>
            <option value="">—</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </div>
      </div>

      <div class="grid two">
        <div class="field">
          <label>Date of birth *</label>
          <input name="dateOfBirth" type="date" required />
        </div>
        <div class="field">
          <label>Contact email</label>
          <input name="email" type="email" maxlength="200" />
        </div>
      </div>

      <div class="field">
        <label>Contact phone</label>
        <input name="phoneNumber" maxlength="20" placeholder="+39 …" />
      </div>

      <div class="field">
        <label>Notes</label>
        <textarea name="notes" rows="2" maxlength="2000"></textarea>
      </div>

      <label class="checkbox-row">
        <input name="consentGiven" type="checkbox" />
        Patient has granted health data processing consent
      </label>

      <div class="flex gap-8 mt-16" style="justify-content:flex-end;">
        <button type="button" class="btn secondary" id="np-cancel">Cancel</button>
        <button type="submit" class="btn" id="np-submit">Create patient</button>
      </div>
    </form>
  </dialog>

  <script src="../assets/js/public-config.js"></script>
  <script type="module" src="./patients.js"></script>
</body>
</html>
