<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Audit log — Uelfy Clinical</title>
  <!-- Favicon set (clinical-context) — see frontend/assets/icons/favicon.svg -->
  <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg" />
  <link rel="alternate icon" type="image/png" sizes="32x32" href="../assets/icons/favicon-32.png" />
  <link rel="alternate icon" type="image/png" sizes="16x16" href="../assets/icons/favicon-16.png" />
  <link rel="shortcut icon" href="../assets/icons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/icons/apple-touch-icon.png" />
  <meta name="theme-color" content="#0E5C7B" />
  <link rel="stylesheet" href="../assets/css/app.css" />
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div class="app-shell">
    <aside class="app-sidebar" aria-label="Primary navigation">
      <div class="brand">Uelfy Clinical</div>
      <nav>
        <a href="./dashboard.html">Dashboard</a>
        <a href="./patients.html">Patients</a>
        <a href="./alerts.html">Alerts</a>
        <a href="./audit.html" class="active">Audit log</a>
        <a href="./tenant-settings.html">Tenant settings</a>
        <a href="#" id="signout-link">Sign out</a>
      </nav>
    </aside>

    <main class="app-main" id="main-content" tabindex="-1">
      <div class="topbar">
        <div>
          <h1 style="margin-bottom:2px;">Audit log</h1>
          <div class="muted" id="tenant-label">Loading…</div>
        </div>
        <div class="flex gap-8">
          <button class="btn secondary" id="export-csv-btn" type="button" title="Download the current filter set as CSV">Export CSV</button>
        </div>
      </div>

      <section class="card mb-16">
        <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 8px;">
          <div>
            <label class="muted" for="filter-action">Action</label>
            <input id="filter-action" type="search" placeholder="patient.create" autocomplete="off" />
          </div>
          <div>
            <label class="muted" for="filter-actor">Actor user id</label>
            <input id="filter-actor" type="search" placeholder="UUID" autocomplete="off" />
          </div>
          <div>
            <label class="muted" for="filter-resource-type">Resource type</label>
            <select id="filter-resource-type">
              <option value="">— any —</option>
              <option value="patient">patient</option>
              <option value="assessment">assessment</option>
              <option value="consent">consent</option>
              <option value="report_export">report_export</option>
              <option value="alert">alert</option>
              <option value="data_subject_request">data_subject_request</option>
              <option value="due_item">due_item</option>
              <option value="session">session</option>
              <option value="system">system</option>
            </select>
          </div>
          <div>
            <label class="muted" for="filter-outcome">Outcome</label>
            <select id="filter-outcome">
              <option value="">— any —</option>
              <option value="success">success</option>
              <option value="failure">failure</option>
            </select>
          </div>
          <div>
            <label class="muted" for="filter-from">From (UTC)</label>
            <input id="filter-from" type="datetime-local" />
          </div>
          <div>
            <label class="muted" for="filter-to">To (UTC)</label>
            <input id="filter-to" type="datetime-local" />
          </div>
        </div>
      </section>

      <section class="card">
        <div id="audit-table-wrap"><p class="muted">Loading…</p></div>
        <div class="flex between mt-16" id="pagination-wrap"></div>
      </section>
    </main>
  </div>

  <script src="../assets/js/public-config.js"></script>
  <script type="module" src="./audit.js"></script>
</body>
</html>
