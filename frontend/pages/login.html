<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Sign in — Uelfy Clinical</title>
  <!-- Favicon set (clinical-context) — see frontend/assets/icons/favicon.svg -->
  <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg" />
  <link rel="alternate icon" type="image/png" sizes="32x32" href="../assets/icons/favicon-32.png" />
  <link rel="alternate icon" type="image/png" sizes="16x16" href="../assets/icons/favicon-16.png" />
  <link rel="shortcut icon" href="../assets/icons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/icons/apple-touch-icon.png" />
  <meta name="theme-color" content="#0E5C7B" />
  <link rel="stylesheet" href="../assets/css/app.css" />
</head>
<body class="flex center min-h-screen">
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <main class="card max-w-380 w-100" id="main-content" tabindex="-1">
    <h1 class="mb-6">Uelfy Clinical</h1>
    <p class="muted mt-0 mb-18 text-sm">
      Sign in with your professional account
    </p>

    <div id="error-banner" class="inline-alert danger hidden" role="alert" aria-live="assertive"></div>

    <form id="login-form" autocomplete="off">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="username" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn w-100" id="submit-btn">Sign in</button>
    </form>

    <p class="muted mt-16 text-xs text-center">
      By signing in you agree to the
      <a href="./legal-privacy.html">privacy notice</a>.
    </p>
  </main>

  <!-- Public env config (anon key + project URL only — never service role) -->
  <script src="../assets/js/public-config.js"></script>
  <script type="module" src="./login.js"></script>
</body>
</html>
