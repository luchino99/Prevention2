<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Cruscotto — Uelfy Clinical</title>
  <!-- Favicon set (clinical-context) — see frontend/assets/icons/favicon.svg -->
  <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg" />
  <link rel="alternate icon" type="image/png" sizes="32x32" href="../assets/icons/favicon-32.png" />
  <link rel="alternate icon" type="image/png" sizes="16x16" href="../assets/icons/favicon-16.png" />
  <link rel="shortcut icon" href="../assets/icons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/icons/apple-touch-icon.png" />
  <meta name="theme-color" content="#0E5C7B" />
  <link rel="stylesheet" href="../assets/css/app.css" />
</head>
<body>
  <a class="skip-link" href="#main-content" data-i18n="common.skip_to_content">Vai al contenuto principale</a>
  <div class="app-shell">
    <aside class="app-sidebar" data-i18n-attr="aria-label:nav.primary_navigation">
      <div class="brand" data-i18n="common.app_name">Uelfy Clinical</div>
      <nav>
        <a href="./dashboard.html" class="active" aria-current="page" data-i18n="nav.dashboard">Cruscotto</a>
        <a href="./patients.html" data-i18n="nav.patients">Pazienti</a>
        <a href="./alerts.html" data-i18n="nav.alerts">Alert clinici</a>
        <a href="./audit.html" id="nav-audit" class="hidden" data-i18n="nav.audit">Log di sicurezza</a>
        <a href="./tenant-settings.html" data-i18n="nav.tenant_settings">Impostazioni</a>
        <a href="#" id="signout-link" data-i18n="common.sign_out">Esci</a>
      </nav>
    </aside>

    <main class="app-main" id="main-content" tabindex="-1">
      <div class="topbar">
        <div>
          <h1 data-i18n="dashboard.title">Cruscotto</h1>
          <div class="muted" id="tenant-label" data-i18n="common.loading">Caricamento in corso…</div>
        </div>
        <div class="user-meta" id="user-meta"></div>
      </div>

      <div id="kpi-row" class="cluster mb-16"></div>

      <section class="card mt-16">
        <div class="flex between">
          <h3 class="m-0" data-i18n="dashboard.recent_patients">Pazienti recenti</h3>
          <a href="./patients.html" class="btn secondary" data-i18n="dashboard.view_all">Vedi tutti</a>
        </div>
        <div id="patients-table-wrap" class="mt-16"></div>
      </section>

      <section class="card">
        <h3 data-i18n="dashboard.high_severity_alerts">Alert ad alta gravità aperti</h3>
        <div id="alerts-wrap"></div>
      </section>
    </main>
  </div>

  <script src="../assets/js/public-config.js"></script>
  <script type="module" src="./dashboard.js"></script>
</body>
</html>
