<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Dashboard — Uelfy Clinical</title>
  <!-- Favicon set (clinical-context) — see frontend/assets/icons/favicon.svg -->
  <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg" />
  <link rel="alternate icon" type="image/png" sizes="32x32" href="../assets/icons/favicon-32.png" />
  <link rel="alternate icon" type="image/png" sizes="16x16" href="../assets/icons/favicon-16.png" />
  <link rel="shortcut icon" href="../assets/icons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/icons/apple-touch-icon.png" />
  <meta name="theme-color" content="#0E5C7B" />
  <link rel="stylesheet" href="../assets/css/app.css" />
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div class="app-shell">
    <aside class="app-sidebar" aria-label="Primary navigation">
      <div class="brand">Uelfy Clinical</div>
      <nav>
        <a href="./dashboard.html" class="active" aria-current="page">Dashboard</a>
        <a href="./patients.html">Patients</a>
        <a href="./alerts.html">Alerts</a>
        <a href="./audit.html" id="nav-audit" class="hidden">Audit log</a>
        <a href="./tenant-settings.html">Tenant settings</a>
        <a href="#" id="signout-link">Sign out</a>
      </nav>
    </aside>

    <main class="app-main" id="main-content" tabindex="-1">
      <div class="topbar">
        <div>
          <h1>Dashboard</h1>
          <div class="muted" id="tenant-label">Loading…</div>
        </div>
        <div class="user-meta" id="user-meta"></div>
      </div>

      <div id="kpi-row" class="cluster mb-16"></div>

      <section class="card mt-16">
        <div class="flex between">
          <h3 style="margin:0;">Recent patients</h3>
          <a href="./patients.html" class="btn secondary">View all</a>
        </div>
        <div id="patients-table-wrap" class="mt-16"></div>
      </section>

      <section class="card">
        <h3>Open high-severity alerts</h3>
        <div id="alerts-wrap"></div>
      </section>
    </main>
  </div>

  <script src="../assets/js/public-config.js"></script>
  <script type="module" src="./dashboard.js"></script>
</body>
</html>
