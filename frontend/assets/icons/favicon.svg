<?xml version="1.0" encoding="UTF-8"?>
<!--
  Uelfy Clinical — favicon (clinical-context).

  Visual concept:
    A rounded clinical "shield" silhouette in the brand teal/blue, carrying an
    ECG sinus rhythm trace that anchors the cardio-nephro-metabolic vertical.
    The trace is a single continuous polyline (PQRST + T-wave repolarisation),
    weighted to read clearly even at 16×16.

  Accessibility:
    `<title>` provides an a11y label that screen readers expose for the
    browser-tab favicon.

  Color theme support:
    The SVG uses a `prefers-color-scheme: dark` media query in <style> to
    swap the trace and outline tone for dark-mode browser chrome (Safari,
    Edge), so the icon stays readable on dark tab bars.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     width="64" height="64"
     role="img"
     aria-labelledby="t">
  <title id="t">Uelfy Clinical</title>
  <style>
    :root { color-scheme: light dark; }
    .bg     { fill: #0E5C7B; }
    .stroke { stroke: #FFFFFF; }
    .accent { fill: #E63946; }
    @media (prefers-color-scheme: dark) {
      .bg     { fill: #0E5C7B; }
      .stroke { stroke: #F4F8FB; }
      .accent { fill: #FF6B7A; }
    }
  </style>

  <!-- Rounded shield/badge background -->
  <rect class="bg" x="2" y="2" width="60" height="60" rx="14" ry="14"/>

  <!-- Subtle inner ring for depth -->
  <rect x="6" y="6" width="52" height="52" rx="11" ry="11"
        fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.2"/>

  <!-- ECG sinus rhythm trace (P-Q-R-S-T) -->
  <polyline
    class="stroke"
    points="
      8,34
      18,34
      22,34
      24,30
      26,38
      28,16
      30,48
      32,30
      36,34
      40,34
      44,28
      48,34
      56,34"
    fill="none"
    stroke-width="3.4"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Beat-marker dot at the QRS apex -->
  <circle class="accent" cx="30" cy="48" r="2.6"/>
</svg>
